name: MikaPlusPlayer

options:
  bundleIdPrefix: lu.daumedia
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true

# Hinweis zur Struktur: iOS und macOS sind ZWEI schlanke Targets, die sich
# DASSELBE Codebase (Sources/) teilen. Grund: Sparkle (Auto-Updater) ist
# macOS-only und lässt sich in einem einzelnen supportedDestinations-Target
# nicht sauber nur für macOS linken. Beide Targets erzeugen "MikaPlusPlayer.app".
packages:
  # VLCKit (xcframework) – für rohe MPEG-TS (.ts), die AVPlayer nicht kann.
  # Import-Modulname: VLCKitSPM. Ohne dieses Paket baut die App weiter (AVKit-Fallback).
  VLCKitSPM:
    url: https://github.com/tylerjonesio/vlckit-spm
    exactVersion: "3.6.0"
  # Sparkle: Auto-Updater (nur macOS), wie bei den anderen Mika+ Apps.
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targetTemplates:
  AppBase:
    type: application
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_NAME: MikaPlusPlayer
        PRODUCT_BUNDLE_IDENTIFIER: lu.daumedia.MikaPlusPlayer
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/Resources/Info.plist
        SWIFT_VERSION: "5.10"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG

targets:
  # ---- iOS ----
  MikaPlusPlayer:
    templates: [AppBase]
    platform: iOS
    deploymentTarget: "17.0"
    settings:
      base:
        # iOS: Automatic. Simulator läuft ohne Team; fürs echte Gerät in Xcode
        # unter "Signing & Capabilities" dein Team wählen.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "CWJM4J4HFN"
    dependencies:
      - package: VLCKitSPM
        product: VLCKitSPM

  # ---- macOS (mit Sparkle-Updater, für DMG-Distribution) ----
  MikaPlusPlayer-macOS:
    templates: [AppBase]
    platform: macOS
    deploymentTarget: "14.0"
    settings:
      base:
        # "Sign to Run Locally" (ad-hoc) -> kein Team nötig.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: "CWJM4J4HFN"
        # Sandbox ist in den Entitlements deaktiviert (DMG-Distribution + Sparkle).
        CODE_SIGN_ENTITLEMENTS: Sources/Resources/MikaPlusPlayer.entitlements
    dependencies:
      - package: VLCKitSPM
        product: VLCKitSPM
      - package: Sparkle
        product: Sparkle

  # ---- Unit-Tests (macOS, gehostet von der Mac-App) ----
  MikaPlusPlayerTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests
    dependencies:
      - target: MikaPlusPlayer-macOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: lu.daumedia.MikaPlusPlayerTests
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: "CWJM4J4HFN"
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/MikaPlusPlayer.app/Contents/MacOS/MikaPlusPlayer
        BUNDLE_LOADER: $(TEST_HOST)

schemes:
  # iOS-Schema (iPhone/iPad/Simulator)
  MikaPlusPlayer:
    build:
      targets:
        MikaPlusPlayer: all
  # macOS-Schema (My Mac) inkl. Tests
  MikaPlusPlayer-macOS:
    build:
      targets:
        MikaPlusPlayer-macOS: all
        MikaPlusPlayerTests: [test]
    test:
      targets:
        - MikaPlusPlayerTests
